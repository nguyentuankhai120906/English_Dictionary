<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ điển Tiếng Anh – Radix Trie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #222; min-height: 100vh; }

  header {
    background: #1a56db; color: white; padding: 18px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header .badge {
    font-size: 12px; background: rgba(255,255,255,0.2);
    padding: 3px 10px; border-radius: 20px;
  }

  .main { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px; max-width: 1100px; margin: 0 auto; }

  .card { background: white; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
  .card-title { font-size: 13px; font-weight: 600; color: #64748b; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; letter-spacing: 0.5px; }

  .tabs { display: flex; border-bottom: 1px solid #e2e8f0; }
  .tab-btn {
    flex: 1; padding: 11px; font-size: 13px; font-weight: 500; border: none; background: none;
    cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn.active { color: #1a56db; border-bottom-color: #1a56db; background: #f8faff; }
  .tab-btn:hover:not(.active) { background: #f8faff; }

  .tab-panel { display: none; padding: 16px; }
  .tab-panel.active { display: block; }

  label { font-size: 13px; color: #475569; display: block; margin-bottom: 5px; font-weight: 500; }
  input[type=text], textarea {
    width: 100%; padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 7px;
    font-size: 14px; margin-bottom: 10px; outline: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, textarea:focus { border-color: #1a56db; }
  textarea { resize: vertical; min-height: 70px; }

  .btn {
    width: 100%; padding: 10px; border-radius: 7px; border: none; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-add { background: #1a56db; color: white; }
  .btn-add:hover { background: #1648c0; }
  .btn-del { background: #ef4444; color: white; }
  .btn-del:hover { background: #dc2626; }
  .btn-search { background: #0ea5e9; color: white; }
  .btn-search:hover { background: #0284c7; }

  .msg { border-radius: 7px; padding: 10px 13px; font-size: 13px; margin-top: 12px; display: none; }
  .msg.show { display: block; }
  .msg.ok { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .msg.err { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .msg.info { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }

  .before-after { margin-top: 14px; }
  .ba-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ba-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .ba-label.before { color: #94a3b8; }
  .ba-label.after { color: #1a56db; }
  .mini-list { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; padding: 8px; max-height: 160px; overflow-y: auto; font-size: 12px; }
  .mini-list .mw { padding: 3px 6px; border-radius: 4px; }
  .mini-list .mw.highlight { background: #dbeafe; color: #1e40af; font-weight: 600; }
  .mini-list .mw.deleted { text-decoration: line-through; color: #94a3b8; }
  .mini-list .empty { color: #94a3b8; font-style: italic; }

  .word-list { max-height: 420px; overflow-y: auto; }
  .word-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px;
    border-bottom: 1px solid #f1f5f9; transition: background 0.1s;
  }
  .word-item:hover { background: #f8faff; }
  .word-item.highlight { background: #eff6ff; }
  .word-item .idx { font-size: 11px; color: #94a3b8; min-width: 22px; padding-top: 2px; }
  .word-item .wname { font-size: 14px; font-weight: 600; color: #1e293b; }
  .word-item .wdef { font-size: 13px; color: #64748b; margin-top: 2px; }
  .word-count { font-size: 12px; color: #64748b; padding: 8px 16px; border-top: 1px solid #f1f5f9; }

  .trie-box { padding: 14px; overflow-x: auto; }
  .trie-tree { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.8; white-space: pre; color: #334155; }
  .trie-tree .node-end { color: #1a56db; font-weight: 600; }
  .trie-tree .node-del { color: #ef4444; text-decoration: line-through; }
  .empty-trie { color: #94a3b8; font-style: italic; font-size: 13px; }

  .search-result { margin-top: 14px; }
  .search-word { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
  .search-def { font-size: 14px; color: #475569; line-height: 1.6; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .ba-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <span style="font-size:24px">📖</span>
  <h1>Từ điển Tiếng Anh</h1>
  <span class="badge">Radix-Trie</span>
</header>

<div class="main">
  <!-- LEFT PANEL: Actions -->
  <div>
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('add')">➕ Thêm từ</button>
        <button class="tab-btn" onclick="switchTab('del')">🗑 Xóa từ</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Tìm nghĩa</button>
      </div>

      <!-- TAB: ADD -->
      <div class="tab-panel active" id="tab-add">
        <label>Từ tiếng Anh</label>
        <input type="text" id="add-word" placeholder="Ví dụ: apple" />
        <label>Nghĩa của từ</label>
        <textarea id="add-def" placeholder="Nhập nghĩa của từ..."></textarea>
        <button class="btn btn-add" onclick="doAdd()">Thêm vào từ điển</button>
        <div class="msg" id="add-msg"></div>
        <div class="before-after" id="add-ba" style="display:none">
          <div class="ba-row">
            <div>
              <div class="ba-label before">Trước khi thêm</div>
              <div class="mini-list" id="ba-before-add"></div>
            </div>
            <div>
              <div class="ba-label after">Sau khi thêm</div>
              <div class="mini-list" id="ba-after-add"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- TAB: DELETE -->
      <div class="tab-panel" id="tab-del">
        <label>Từ cần xóa</label>
        <input type="text" id="del-word" placeholder="Ví dụ: apple" />
        <button class="btn btn-del" onclick="doDelete()">Xóa từ</button>
        <div class="msg" id="del-msg"></div>
        <div class="before-after" id="del-ba" style="display:none">
          <div class="ba-row">
            <div>
              <div class="ba-label before">Trước khi xóa</div>
              <div class="mini-list" id="ba-before-del"></div>
            </div>
            <div>
              <div class="ba-label after">Sau khi xóa</div>
              <div class="mini-list" id="ba-after-del"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- TAB: SEARCH -->
      <div class="tab-panel" id="tab-search">
        <label>Từ cần tra</label>
        <input type="text" id="search-word" placeholder="Ví dụ: apple" />
        <button class="btn btn-search" onclick="doSearch()">Tìm nghĩa</button>
        <div class="msg" id="search-msg"></div>
        <div class="search-result" id="search-result" style="display:none">
          <div class="search-word" id="sr-word"></div>
          <div class="search-def" id="sr-def"></div>
        </div>
      </div>
    </div>

    <!-- TRIE STRUCTURE -->
    <div class="card" style="margin-top:14px">
      <div class="card-title">🌳 Cấu trúc Radix-Trie</div>
      <div class="trie-box">
        <div class="trie-tree" id="trie-viz"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: Word List -->
  <div class="card">
    <div class="card-title">📚 Toàn bộ từ điển</div>
    <div class="word-list" id="word-list"></div>
    <div class="word-count" id="word-count">0 từ</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  RADIX TRIE (port từ radix_trie.py)
// ═══════════════════════════════════════════

class RadixTrieNode {
  constructor(edgeLabel = '') {
    this.edgeLabel = edgeLabel;
    this.children = {};      // {firstChar -> RadixTrieNode}
    this.isEnd = false;
    this.isDeleted = false;
    this.word = null;
    this.definition = null;
  }
}

class RadixTrie {
  constructor() {
    this.root = new RadixTrieNode('');
    this._wordCount = 0;
  }

  _commonPrefixLen(a, b) {
    let i = 0;
    while (i < a.length && i < b.length && a[i] === b[i]) i++;
    return i;
  }

  _validate(word) {
    word = word.trim().toLowerCase();
    if (!word) throw new Error('Từ không được để trống.');
    const valid = /^[a-z'-]+$/.test(word);
    if (!valid) throw new Error('Từ chỉ được gồm chữ cái a-z, dấu nháy đơn hoặc gạch ngang.');
    return word;
  }

  // ── INSERT ──────────────────────────────
  insert(word, definition) {
    try { word = this._validate(word); }
    catch(e) { return { ok: false, msg: e.message }; }
    definition = definition.trim();
    if (!definition) return { ok: false, msg: 'Nghĩa không được để trống.' };

    const res = this._insertNode(this.root, word, word, definition);
    if (res.ok) this._wordCount++;
    return res;
  }

  _insertNode(node, remaining, fullWord, definition) {
    if (!remaining) {
      if (node.isEnd && !node.isDeleted)
        return { ok: false, msg: `Từ "${fullWord}" đã tồn tại.` };
      node.isEnd = true;
      node.isDeleted = false;
      node.word = fullWord;
      node.definition = definition;
      return { ok: true, msg: `✓ Đã thêm "${fullWord}".` };
    }
    const fc = remaining[0];
    if (!(fc in node.children)) {
      const leaf = new RadixTrieNode(remaining);
      leaf.isEnd = true; leaf.word = fullWord; leaf.definition = definition;
      node.children[fc] = leaf;
      return { ok: true, msg: `✓ Đã thêm "${fullWord}".` };
    }
    const child = node.children[fc];
    const cp = this._commonPrefixLen(remaining, child.edgeLabel);

    if (cp === child.edgeLabel.length) {
      return this._insertNode(child, remaining.slice(cp), fullWord, definition);
    }
    // SPLIT
    const mid = new RadixTrieNode(child.edgeLabel.slice(0, cp));
    child.edgeLabel = child.edgeLabel.slice(cp);
    mid.children[child.edgeLabel[0]] = child;

    const suffix = remaining.slice(cp);
    if (suffix) {
      const newLeaf = new RadixTrieNode(suffix);
      newLeaf.isEnd = true; newLeaf.word = fullWord; newLeaf.definition = definition;
      mid.children[suffix[0]] = newLeaf;
    } else {
      mid.isEnd = true; mid.word = fullWord; mid.definition = definition;
    }
    node.children[fc] = mid;
    return { ok: true, msg: `✓ Đã thêm "${fullWord}" (trie đã split).` };
  }

  // ── SEARCH ──────────────────────────────
  search(word) {
    try { word = this._validate(word); }
    catch(e) { return { ok: false, msg: e.message }; }
    const node = this._searchNode(this.root, word);
    if (!node) return { ok: false, msg: `✗ Không tìm thấy "${word}".` };
    if (node.isDeleted) return { ok: false, msg: `✗ Từ "${word}" đã bị xóa.` };
    return { ok: true, word: node.word, definition: node.definition };
  }

  _searchNode(node, remaining) {
    if (!remaining) return (node.isEnd) ? node : null;
    const fc = remaining[0];
    if (!(fc in node.children)) return null;
    const child = node.children[fc];
    const cp = this._commonPrefixLen(remaining, child.edgeLabel);
    if (cp < child.edgeLabel.length) return null;
    return this._searchNode(child, remaining.slice(cp));
  }

  // ── DELETE (soft delete) ─────────────────
  delete(word) {
    try { word = this._validate(word); }
    catch(e) { return { ok: false, msg: e.message }; }
    const node = this._searchNode(this.root, word);
    if (!node || !node.isEnd) return { ok: false, msg: `✗ Từ "${word}" không tồn tại.` };
    if (node.isDeleted) return { ok: false, msg: `✗ Từ "${word}" đã bị xóa trước đó.` };
    node.isDeleted = true;
    this._wordCount = Math.max(0, this._wordCount - 1);
    return { ok: true, msg: `✓ Đã xóa "${word}".` };
  }

  // ── GET ALL WORDS ────────────────────────
  getAllWords(includeDeleted = false) {
    const result = [];
    this._collect(this.root, result, includeDeleted);
    result.sort((a, b) => a.word.localeCompare(b.word));
    return result;
  }

  _collect(node, result, includeDeleted) {
    if (node.isEnd && (includeDeleted || !node.isDeleted)) {
      result.push({ word: node.word, definition: node.definition, deleted: node.isDeleted });
    }
    for (const child of Object.values(node.children)) {
      this._collect(child, result, includeDeleted);
    }
  }

  // ── VISUALIZE ───────────────────────────
  visualize() {
    const lines = ['[ROOT]'];
    this._vizRecursive(this.root, '', true, lines);
    return lines.join('\n');
  }

  _vizRecursive(node, prefix, isLast, lines) {
    const children = Object.values(node.children);
    children.forEach((child, i) => {
      const isChildLast = (i === children.length - 1);
      const connector = isChildLast ? '└── ' : '├── ';
      const branch    = isChildLast ? '    ' : '│   ';
      let label = `"${child.edgeLabel}"`;
      let cls = '';
      if (child.isEnd) {
        if (child.isDeleted) { label += ' [DELETED]'; cls = 'node-del'; }
        else { label += ` ★ ${child.word}`; cls = 'node-end'; }
      }
      lines.push({ text: prefix + connector + label, cls });
      this._vizRecursive(child, prefix + branch, isChildLast, lines);
    });
  }

  get wordCount() { return this._wordCount; }
}

// ═══════════════════════════════════════════
//  SEED DATA (từ main.py)
// ═══════════════════════════════════════════
const SEED = [
  ['apple',       'a round fruit with red or green skin and white flesh'],
  ['application', 'a program or piece of software designed for a specific purpose'],
  ['apply',       'to put something on a surface; to request formally'],
  ['bee',         'a flying insect that makes honey'],
  ['bear',        'a large, heavy mammal with thick fur'],
  ['bit',         'a small piece or amount of something'],
  ['cat',         'a small domesticated carnivorous mammal'],
  ['car',         'a road vehicle powered by a motor engine'],
  ['data',        'facts or information used for reference or analysis'],
  ['dog',         'a domesticated carnivorous mammal kept as a pet'],
  ['happy',       'feeling or showing pleasure or contentment'],
  ['hello',       'used as a greeting or to begin a conversation'],
];

const trie = new RadixTrie();
SEED.forEach(([w, d]) => trie.insert(w, d));

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
let lastHighlight = null;

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['add','del','search'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach((p, i) => {
    p.classList.toggle('active', ['tab-add','tab-del','tab-search'][i] === `tab-${name}`);
  });
}

function renderWordList(highlight = null) {
  const words = trie.getAllWords(false);
  const list = document.getElementById('word-list');
  if (!words.length) {
    list.innerHTML = '<div style="padding:20px 16px;color:#94a3b8;font-size:13px;font-style:italic">Từ điển đang trống.</div>';
  } else {
    list.innerHTML = words.map((e, i) => `
      <div class="word-item${e.word === highlight ? ' highlight' : ''}">
        <div class="idx">${i+1}.</div>
        <div>
          <div class="wname">${e.word}</div>
          <div class="wdef">${e.definition}</div>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('word-count').textContent = `${trie.wordCount} từ`;
  if (highlight) {
    setTimeout(() => {
      const el = list.querySelector('.highlight');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}

function renderMiniList(containerId, words, highlight = null, deleted = null) {
  const el = document.getElementById(containerId);
  if (!words.length) {
    el.innerHTML = '<span class="empty">(trống)</span>';
    return;
  }
  el.innerHTML = words.map(e => {
    let cls = '';
    if (e.word === highlight) cls = 'highlight';
    if (e.word === deleted) cls = 'deleted';
    return `<div class="mw ${cls}">${e.word}</div>`;
  }).join('');
}

function renderTrie() {
  const result = trie.visualize();
  const viz = document.getElementById('trie-viz');
  if (typeof result === 'string') {
    viz.textContent = result;
    return;
  }
  viz.innerHTML = result.map(item => {
    if (typeof item === 'string') return `<span>${escHtml(item)}</span>`;
    if (item.cls) return `<span class="${item.cls}">${escHtml(item.text)}</span>`;
    return `<span>${escHtml(item.text)}</span>`;
  }).join('\n');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fixTrieViz() {
  const lines = [];
  function visit(node, prefix, isLast) {
    const children = Object.values(node.children);
    children.forEach((child, i) => {
      const last = i === children.length - 1;
      const con = last ? '└── ' : '├── ';
      const br  = last ? '    ' : '│   ';
      let label = `"${child.edgeLabel}"`;
      let cls = '';
      if (child.isEnd) {
        if (child.isDeleted) { label += ' [DELETED]'; cls = 'node-del'; }
        else { label += ` ★ ${child.word}`; cls = 'node-end'; }
      }
      lines.push(`<span class="${cls}">${escHtml(prefix + con + label)}</span>`);
      visit(child, prefix + br, last);
    });
  }
  const viz = document.getElementById('trie-viz');
  viz.innerHTML = '<span>[ROOT]</span>';
  visit(trie.root, '', true);
  if (lines.length) viz.innerHTML += '\n' + lines.join('\n');
  else viz.innerHTML += '\n<span style="color:#94a3b8;font-style:italic">(trống)</span>';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg show ${type}`;
}

// ═══════════════════════════════════════════
//  OPERATIONS
// ═══════════════════════════════════════════
function doAdd() {
  const word = document.getElementById('add-word').value;
  const def  = document.getElementById('add-def').value;

  const beforeWords = trie.getAllWords(false);
  const res = trie.insert(word, def);

  showMsg('add-msg', res.msg, res.ok ? 'ok' : 'err');

  if (res.ok) {
    const afterWords = trie.getAllWords(false);
    const wordLow = word.trim().toLowerCase();

    document.getElementById('add-ba').style.display = 'block';
    renderMiniList('ba-before-add', beforeWords);
    renderMiniList('ba-after-add', afterWords, wordLow);

    renderWordList(wordLow);
    fixTrieViz();

    document.getElementById('add-word').value = '';
    document.getElementById('add-def').value = '';
  } else {
    document.getElementById('add-ba').style.display = 'none';
  }
}

function doDelete() {
  const word = document.getElementById('del-word').value;

  const beforeWords = trie.getAllWords(false);
  const res = trie.delete(word);

  showMsg('del-msg', res.msg, res.ok ? 'ok' : 'err');

  if (res.ok) {
    const wordLow = word.trim().toLowerCase();
    const afterWords = trie.getAllWords(false);

    document.getElementById('del-ba').style.display = 'block';
    renderMiniList('ba-before-del', beforeWords, wordLow);
    renderMiniList('ba-after-del', afterWords);

    renderWordList();
    fixTrieViz();

    document.getElementById('del-word').value = '';
  } else {
    document.getElementById('del-ba').style.display = 'none';
  }
}

function doSearch() {
  const word = document.getElementById('search-word').value;
  const res = trie.search(word);

  const resultBox = document.getElementById('search-result');
  if (res.ok) {
    document.getElementById('search-msg').className = 'msg';
    resultBox.style.display = 'block';
    document.getElementById('sr-word').textContent = res.word;
    document.getElementById('sr-def').textContent = res.definition;
    renderWordList(res.word);
  } else {
    showMsg('search-msg', res.msg, 'err');
    resultBox.style.display = 'none';
    renderWordList();
  }
}

// Allow Enter key
['add-word','add-def'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey) doAdd(); });
});
document.getElementById('del-word').addEventListener('keydown', e => { if(e.key==='Enter') doDelete(); });
document.getElementById('search-word').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

// ── Init ────────────────────────────────────
renderWordList();
fixTrieViz();
</script>
</body>
</html>
